<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regina Jin | Tech PM</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --forest: #2D5C44;
            --sage:   #7EB49A;
            --ink:    #141414;
            --bone:   #F4F1EC;
            --muted:  #888880;
            --white:  #ffffff;
            --border: #D8D3CA;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background-color: var(--bone);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .card {
            background: rgba(255, 255, 255, 0.72);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-radius: 32px;
            padding: 48px 32px;
            width: 85%;
            max-width: 340px;
            box-shadow: 0 20px 48px rgba(45, 92, 68, 0.08), 0 2px 8px rgba(0,0,0,0.04);
            border: 1px solid rgba(255,255,255,0.85);
            text-align: center;
            transition: transform 0.4s ease;
        }

        .avatar-container {
            width: 92px;
            height: 92px;
            margin: 0 auto 24px;
            position: relative;
        }

        .profile-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            display: block;
            box-shadow: 0 4px 14px rgba(45, 92, 68, 0.18);
            border: 2px solid var(--sage);
        }

        .avatar-placeholder {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, var(--forest), #1a3d2c);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 1.4rem;
            z-index: -1;
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
        }

        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.65rem;
            font-weight: 400;
            color: var(--ink);
            margin: 0;
            letter-spacing: 0.01em;
            line-height: 1.2;
        }

        .tagline {
            font-size: 0.82rem;
            color: var(--muted);
            margin: 10px 0 30px;
            line-height: 1.6;
            font-weight: 300;
        }
        .tagline b {
            color: var(--forest);
            font-weight: 500;
        }

        .divider {
            width: 40px;
            height: 1px;
            background: var(--sage);
            margin: 0 auto 28px;
            opacity: 0.6;
        }

        .btn-group { display: flex; flex-direction: column; gap: 14px; }

        .btn {
            padding: 16px 20px;
            border-radius: 14px;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.88rem;
            letter-spacing: 0.03em;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            font-family: 'DM Sans', sans-serif;
        }

        .btn-primary {
            background-color: var(--forest);
            color: white;
            box-shadow: 0 6px 18px rgba(45, 92, 68, 0.22);
        }
        .btn-primary:hover {
            background-color: #234a36;
            transform: translateY(-2px);
            box-shadow: 0 10px 24px rgba(45, 92, 68, 0.28);
        }

        .btn-secondary {
            background-color: var(--white);
            color: var(--ink);
            border: 1px solid var(--border);
        }
        .btn-secondary:hover {
            border-color: var(--sage);
            color: var(--forest);
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(0,0,0,0.06);
        }

        .btn:active { transform: scale(0.97); }

        .footer {
            margin-top: 40px;
            font-size: 0.65rem;
            color: var(--sage);
            letter-spacing: 2px;
            opacity: 0.7;
        }
    </style>
</head>
